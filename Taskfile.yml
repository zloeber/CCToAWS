# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"
silent: true
env:
  PROJECT:
    sh: 'echo "$(basename $(pwd))" | tr "[:upper:]" "[:lower:]"'
  LOCAL_BIN_PATH:
    sh: 'echo "{{.ROOT_DIR}}/.venv/bin"'
  BUILD_DATE:
    sh: "date '+%Y-%m-%d-%H:%M:%S'"
  BUILD_DATE_SHORT:
    sh: "date '+%Y-%m-%d-%H%M%S'"
  GIT_LATEST_TAG:
    sh: 'git tag -l 2>/dev/null | sort -r -V | head -n 1 2>/dev/null || echo "not a git repo"'
  TERM: screen-256color
  DOCS_PATH: "{{.ROOT_DIR}}/docs"
  PYTHON_VENV_PATH: "{{.ROOT_DIR}}/.venv"
  SCRIPT_PATH: "{{.ROOT_DIR}}/scripts"
  VERSION: '{{default "unknown" .GIT_LATEST_TAG}}'
  COMPOSE_BAKE: true

dotenv:
  - ".env"

includes:
  github:
    taskfile: ./tasks/Taskfile.github.yml
    optional: true

tasks:
  default:
    cmds:
      - |
        task -l

  show:
    desc: Show task variables
    cmds:
      - |
        echo "ROOT_PATH: {{.ROOT_DIR}}"
        echo "PROJECT: {{.PROJECT}}"
        echo "VERSION: {{.VERSION}}"
        echo "OS: {{OS}}"
        echo "ARCH: {{ARCH}}"
        echo "LOCAL_BIN_PATH: {{.LOCAL_BIN_PATH}}"
        echo "PYTHON_VENV_PATH: {{.PYTHON_VENV_PATH}}"
        echo "SCRIPT_PATH: {{.SCRIPT_PATH}}"
        echo "BUILD_DATE: {{.BUILD_DATE}}"
        echo "GIT_LATEST_TAG: {{.GIT_LATEST_TAG}}"

  show:all:
    desc: Show all variables for task namespaces
    cmds:
      - |
        echo "## Show ##";
        task show
        echo ""
        for taskitem in $(task -l | cut -d " " -f2 | grep show | sed 's/.$//'); do
          if [[ "$taskitem" != "show:all" ]]; then
            echo "## Show - ${taskitem} ##";
            task $taskitem;
            echo "";
          fi
        done

  list:
    desc: List tasks by namespace (task list -- <namespace>)
    cmds:
      - |
        if [[ "{{.CLI_ARGS}}" != "" ]]; then
          task -l | grep {{default "" .CLI_ARGS}}
        else
          task -l
        fi

  secrets:
    desc: Create .env file if one does not already exist.
    cmds:
      - cp ./.env.EXAMPLE ./.env
    status:
      - "test -f .env"

  secret:search:
    desc: Find secrets in the codebase and in git history
    cmds:
      - gitleaks detect --source ./ -f json -r secret_results.json

  start:mcp:inspector:
    desc: Start MCP Inspector (thv)
    cmds:
      - npx -y @modelcontextprotocol/inspector --transport http --server-url http://localhost:3000/mcp
    env:
      DANGEROUSLY_OMIT_AUTH: true

  lint:
    desc: Lint terraform files
    cmds:
      - |
        folders=(./terraform)
        for module in "${folders[@]}"; do
          echo "linting module - ${module}"
          tflint --chdir=$module 
        done

  clean:
    desc: Clean the project
    cmds:
      - |
        find . -type d -name "__pycache__" -exec rm -rf {} +
        find . -type d -name "*.egg-info" -exec rm -rf {} +
        find . -type f -name ".DS_Store" -delete
        find . -type f -name "*.pyc" -delete
        find . -type f -name "*.pyo" -delete
        rm -rf .mypy_cache
        rm -rf .pytest_cache
        rm -rf .ruff_cache
        rm -rf dist
        rm -rf .coverage
        rm -rf .coverage.*
        rm -rf .coverage.xml
        rm -rf .DS_Store
        rm -rf .pytest_cache
        rm -rf .venv
        rm -rf src/terraform_ingest/_version.py
        rm -rf chromadb
        rm -rf ./output
        rm -rf ./repos
        rm -rf ./site

  scan:
    desc: Security scan for terraform
    cmds:
      - |
        terrascan init
        terrascan scan -d ./terraform -i terraform

  tfsec:
    desc: Security scan for terraform
    cmds:
      - tfsec ./terraform -m CRITICAL

  docs:
    desc: Create terraform docs
    cmds:
      - |
        folders=$(find {{.MODULE_PATHS}} -maxdepth 2 -type f -name "*.tf" -exec dirname {} \; | sort -u)
        echo "$folders" | while read -r module; do
          echo "Creating docs for module - ${module}"
          terraform-docs markdown --hide providers --output-file README.MD "$module"
        done
        #terraform-docs markdown . --output-file README.MD

  format:
    desc: Perform terraform format against all tf files
    silent: true
    cmds:
      - terraform fmt -recursive -write=true .

  decode:aws:error:
    desc: Decode AWS error messages
    vars:
      ERROR_MESSAGE: "{{.CLI_ARGS}}"
    cmds:
      - |
        if [[ -z "{{.ERROR_MESSAGE}}" ]]; then
          echo "Please provide an error message to decode."
          exit 1
        fi
        aws sts decode-authorization-message --encoded-message {{.ERROR_MESSAGE}} --query DecodedMessage --output text | jq '.'

  clean:terraform:
    desc: Remove all .terraform directories recursively
    cmds:
      - |
        find . -type d -name ".terraform" -exec rm -rf {} +

  diagram:
    desc: Generate the architecture diagram
    cmds:
      - |
        uv run scripts/generate_architecture_diagram.py